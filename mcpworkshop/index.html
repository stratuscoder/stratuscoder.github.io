<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Workshop Resources</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
      margin: 0;
      padding: 40px;
    }
    .container {
      display: flex;
      gap: 20px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .card {
      background-color: #fff;
      border-radius: 8px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      padding: 20px;
      width: 300px;
      text-align: center;
    }
    .card h2 {
      margin-top: 10px;
    }
    .card p {
      color: #555;
    }
    .card a {
      display: inline-block;
      margin-top: 15px;
      padding: 10px 20px;
      background-color: #0078d4;
      color: white;
      text-decoration: none;
      border-radius: 4px;
    }
    .card a:hover {
      background-color: #005a9e;
    }
    .icon {
      font-size: 40px;
      color: #0078d4;
    }
  </style>
</head>
<body>
  <h1>Workshop Resources</h1>
  <div class="container">
    <div class="card">
      <i class="fas fa-book icon"></i>
      <h2>Workshop Documentation</h2>
      <p>Easy to follow directions</p>
      <a href="https://www.dynatrace.com" target="_blank">Go</a>
    </div>
    <div class="card">
      <i class="fas fa-laptop-code icon"></i>
      <h2>Workshop Workspace</h2>
      <p>Easy to follow github steps</p>
      <a href="https://www.dynatrace.com" target="_blank">Go</a>
    </div>
    <div class="card">
      <i class="fas fa-code icon"></i>
      <h2>Workshop Code</h2>
      <p>Easy to follow code examples</p>
      <a href="https://www.dynatrace.com" target="_blank">Go</a>
    </div>
  </div>
</body>
</html>

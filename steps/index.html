    function getRandomNumber(min, max) {
        return Math.floor(Math.random() * (max - min + 1)) + min;
    }   

    function generateSteps(max) {
        const data = getData();
        const steps = document.getElementById("steps");
        steps.innerHTML = "";

        for (let i = 0; i <= max; i++) {
            
            //const width = getRandomNumber(180, 520);
            //const height = getRandomNumber(140, 420);
            //const seed = Math.floor(Math.random() * 100000);

            const step = document.createElement("p");
            step.innerHTML = `Step ${i+1}: ${data[i].caption}`;
            const card = document.createElement("div");
            card.className = "image-card";

            const image = document.createElement("img");
            image.src = `${data[i].image}`;
            image.width = `${data[i].width}`;
            //image.height = height;
            image.alt = `${data[i].image}`;
            card.appendChild(image);

            /*
            const caption = document.createElement("div");
            caption.className = "caption";
            caption.innerHTML = `Step ${i+1}: ${data[i].caption}`;
            card.appendChild(caption);
            */

            if (data[i].buttonLabel.length > 0 && data[i].buttonAction.length > 0){
                const button = document.createElement("button");
                button.textContent = data[i].buttonLabel;
                button.onclick = function() { copytoClipboard(data[i].buttonData) };
                card.appendChild(button);
            }

            steps.appendChild(step);
            steps.appendChild(card);
        }
    }

    generateSteps(28);

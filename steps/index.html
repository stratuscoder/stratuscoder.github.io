<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8" />
 <meta name="viewport" content="width=device-width, initial-scale=1.0" />
 <title>Random Image Layout</title>
 <style>
  body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 24px;
    background: #f6f6f6;
     color: #222;
  }
  h1 {
    margin-bottom: 8px;
  }
  .instructions {
    max-width: 850px;
    line-height: 1.6;
    background: white;
    padding: 16px 18px;
    border-radius: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    margin-bottom: 24px;
  }
  .gallery {
    display: flex;
    flex-wrap: wrap;
    gap: 18px;
    align-items: flex-start;
  }
  .image-card {
    background: white;
    padding: 10px;
    border-radius: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }
  .image-card img {
    display: block;
    border-radius: 8px;
    object-fit: cover;
  }
  .caption {
    font-size: 13px;
    margin-top: 8px;
    color: #555;
  }
</style>
</head>
<body>
    <h1>MCP Workshop Setup</h1>
    <h4>Step By Step Guide</h4>
    <p class="instructions">
        Pre-reqs: 
        <ul>
            <li>Node.JS must be installed</li>
            <li>VSCode must be installed</li>
            <li>Ability to add extensions in VSCode may be required</li>
            <li>Follow each step in order</li>
        </ul>
        Please click the "Start" button to begin.
    </p>
    <button onclick="copytoClipboard()">Start</button>
    <div id="steps" class="steps">
    </div>

<script>
    function getConfig() {
        return {
            "tenant": "playground",
            "domain": ".apps.dynatrace.com",
            "github": "https://github.com/dynatrace-oss/dt-mcp-playground",
            "minHeight": 140,
            "maxHeight": 420
        };
    }
    async function copytoClipboard() {
        try {
            const config = getConfig();
            await navigator.clipboard.writeText(config.github);
            alert("Copied to clipboard: " + config.github);
        } catch (err) {
            console.error("Failed to copy: ", err);
        }
    }

    function getData() {

        const config = getConfig();

        return [
            {
                "step": 1,
                "image": "./screens/01.png",
                "width": 400,
                "caption":"Launch VSCode and click on File ... New Window from the menu."
            },
            {
                "step": 2,
                "image": "./screens/02.png",
                "width": 400,
                "caption": "Click on one of the Clone Repository buttons"
            },
            {
                "step": 3,
                "image": "./screens/03.png",
                "width": 400,
                "caption": "Paste the previously copied github URL into the selector and press enter."
            },
            {
                "step": 4,
                "image": "./screens/04.png",
                "width": 600,
                "caption": "Select a folder to be used to clone the repository into."
            },
            {
                "step": 5,
                "image": "./screens/05.png",
                "width": 600,
                "caption":"Click on Select a Repository Destination."
            },
                        {
                "step": 6,
                "image": "./screens/06.png",
                "width": 400,
                "caption": "Click Open in the popup to open the cloned repository in a new VSCode window."
            },
            {
                "step": 7,
                "image": "./screens/07.png",
                "width": 400,
                "caption": "Once cloned you should see the project files like the image below."
            },
{
                "step": 8,
                "image": "./screens/08.png",
                "width": 600,
                "caption": "Click on extensions and filer for Github Copilot Chat, if there is an install button click it."
            },
            {
                "step": 9,
                "image": "./screens/09.png",
                "width": 600,
                "caption": "Once it is installed it should look like the image below."
            },
            {
                "step": 10,
                "image": "./screens/10.png",
                "width": 600,
                "caption": "Click on the command filter at the top of the screen and search for '>settings', click on Preferencses: Open Workspace Settings (JSON)"
            },
            {
                "step": 11,
                "image": "./screens/11.png",
                "width": 400,
                "caption": 'Replace the JSON with { "chat.mcp.enabled": true} and save the file.'
            },
            {
                "step": 12,
                "image": "./screens/12.png",
                "width": 600,
                "caption": "Click on the .vscode \ mcp.json file to view it."
            },
            {
                "step": 13,
                "image": "./screens/13.png",
                "width": 400,
                "caption": "Review contents of the file. Do not edit the file, but locate the Start section and click on it."
            },
            {
                "step": 14,
                "image": "./screens/14.png",
                "width": 600,
                "caption": "Once clicked it may prompt you for the Dynatrace tenant to connect too. If so copy and paste following: https://playground.apps.dynatrace.com and press enter button to connect."
            },
            {
                "step": 15,
                "image": "./screens/15.png",
                "width": 400,
                "caption": "This will attempt to connect to the Dynatrace tenant and authenticate your user account. Another window may popup for authentication purposes. If successful you will see the status change from Start to Running in the mcp.json file."
            },
            {
                "step": 16,
                "image": "./screens/16.png",
                "width": 400,
                 "caption": "Click on the command filter at the top of the screen and search for '>open chat', click on Chat: Open Chat (Agent)"
            },
            {
                "step": 17,
                "image": "./screens/17.png",
                "width": 400,
                "caption": "When the chat prompt opens, it is usually on the right side of the IDE, review the options for models. Models can be adjusted to retrieve/act with different results."
            },
            {
                "step": 18,
                "image": "./screens/18.png",
                "width": 400,
                "caption": "There are also different ways to interact with the MCP prompt, checkout the agent options."
            },
            {
                "step": 19,
                "image": "./screens/19.png",
                "width": 600,
                "caption": "Congratulations! You've successfully set up your local MCP Workshop project. Let's try out some prompts"
            },
            {
                "step": 20,
                "image": "./screens/20.png",
                "width": 400,
                "caption": "If all went well, you should have received a response with the tenant details from the Dynatrace tenant."
            },
            {
                "step": 21,
                "image": "./screens/21.png",
                "width": 400,
                "caption": "You can now explore other prompts, try some on your own or try some of the prompts built into this project.<br/>Type a / and pick from the list of numbered prompts."
            }       
        ];

    }
    
    function getRandomNumber(min, max) {
        return Math.floor(Math.random() * (max - min + 1)) + min;
    }   

    function generateSteps(max) {
        const data = getData();
        const steps = document.getElementById("steps");
        steps.innerHTML = "";

        for (let i = 0; i <= max; i++) {
            
            //const width = getRandomNumber(180, 520);
            //const height = getRandomNumber(140, 420);
            //const seed = Math.floor(Math.random() * 100000);

            const step = document.createElement("p");
            step.textContent = `Step ${i+1}: ${data[i].caption}`;
            const card = document.createElement("div");
            card.className = "image-card";

            const image = document.createElement("img");
            image.src = `${data[i].image}`;
            image.width = `${data[i].width}`;
            //image.height = height;
            image.alt = `${data[i].image}`;

            const caption = document.createElement("div");
            caption.className = "caption";
            caption.textContent = `Step ${i+1}: ${data[i].caption}`;

            card.appendChild(image);
            card.appendChild(caption);
            steps.appendChild(step);
            steps.appendChild(card);
        }
    }

    generateSteps(28);
</script>

</body>

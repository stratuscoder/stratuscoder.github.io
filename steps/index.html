<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8" />
 <meta name="viewport" content="width=device-width, initial-scale=1.0" />
 <title>Random Image Layout</title>
 <style>
  body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 24px;
    background: #f6f6f6;
     color: #222;
  }
  h1 {
    margin-bottom: 8px;
  }
  .instructions {
    max-width: 850px;
    line-height: 1.6;
    background: white;
    padding: 16px 18px;
    border-radius: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    margin-bottom: 24px;
  }
  .gallery {
    display: flex;
    flex-wrap: wrap;
    gap: 18px;
    align-items: flex-start;
  }
  .image-card {
    background: white;
    padding: 10px;
    border-radius: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }
  .image-card img {
    display: block;
    border-radius: 8px;
    object-fit: cover;
  }
  .caption {
    font-size: 13px;
    margin-top: 8px;
    color: #555;
  }
</style>
</head>
<body>
    <h1>MCP Workshop Setup Step By Step</h1>
    <div id="steps" class="steps">
    </div>
<script>
    function getData() {

        const data = [
            {
                "step": 1,
                "image": "./screens/01.png",
                "caption": "Step 1: Download the MCP Workshop Installer from the official website."
            },
            {
                "step": 2,
                "image": "./screens/02.png",
                "caption": "Step 2: Run the installer and follow the on-screen instructions to set up the workshop environment."
            },
            {
                "step": 3,
                "image": "./screens/03.png",
                "caption": "Step 3: Once installation is complete, launch the MCP Workshop application."
            },
            {
                "step": 4,
                "image": "./screens/04.png",
                "caption": "Step 4: Create a new project by selecting 'New Project' from the main menu."
            },
            {
                "step": 5,
                "image": "./screens/05.png",
                "caption": "Step 5: Configure your project settings, including project name and location."
            },
            {
                "step": 6,
                "image": "./screens/06.png",
                "caption": "Step 6: Import your assets into the project by dragging and dropping them into the asset library."
            },
            {
                "step": 7,
                "image": "./screens/07.png",
                "caption": "Step 7: Use the timeline to arrange your assets and create your desired sequence."
            },
            {
                "step": 8,
                "image": "./screens/08.png",
                "caption": "Step 8: Preview your project using the built-in preview feature to ensure everything looks correct."
            },
            {
                "step": 9,
                "image": "./screens/09.png",
                "caption": "Step 9: Export your final project in your preferred format for sharing or further editing."
            },
            {
                "step": 10,
                "image": "./screens/10.png",
                "caption": "Step 10: Congratulations! You've successfully set up and completed your MCP Workshop project."
            }
        ];
        return data;
    }
    
    function getRandomNumber(min, max) {
        return Math.floor(Math.random() * (max - min + 1)) + min;
    }   

    function generateSteps(max) {
        const data = getData();
        const steps = document.getElementById("steps");
        steps.innerHTML = "";

        for (let i = 1; i <= max; i++) {
            //const width = getRandomNumber(180, 520);
            //const height = getRandomNumber(140, 420);
            //const seed = Math.floor(Math.random() * 100000);

            const step = document.createElement("p");
            step.textContent = data[i].caption;
            const card = document.createElement("div");
            card.className = "image-card";

            const image = document.createElement("img");
            image.src = `${data[i].image}`;
            //image.width = width;
            //image.height = height;
            image.alt = `${data[i].image}`;

            const caption = document.createElement("div");
            caption.className = "caption";
            caption.textContent = `${data[i].caption}`;

            card.appendChild(image);
            card.appendChild(caption);
            steps.appendChild(step);
            steps.appendChild(card);
        }
    }

    generateSteps(10);
</script>
